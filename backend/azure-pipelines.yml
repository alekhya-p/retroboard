trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'backend/**'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: retroboard
  - name: resourceGroup
    value: 'retroboard'
  - name: location
    value: 'francecentral'
  - name: appLocation
    value: 'francecentral'
  - name: appName
    value: 'retroboard-app'
  - name: planName
    value: 'retroboard-plan'
  - name: dockerImageName
    value: 'retroboard-app'
  - name: dockerRegistry
    value: 'retroboardregistry'
  - name: serviceConnection
    value: 'azure_retroboard'

steps:
# Step 1: Login to Azure
- task: AzureCLI@2
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Logging into Azure..."
      az account show
- task: Bash@3
  displayName: 'Convert .env.example to .env and update values'
  inputs:
    targetType: 'inline'
    script: |
      echo "Converting .env.example to .env and updating values..."
      cp backend/.env.example backend/.env

      sed -i "s|<MONGODB_PASSWORD_PLACEHOLDER>|$(MONGODB_PASSWORD)|" backend/.env
      sed -i "s|<MICROSOFT_CLIENT_SECRET_PLACEHOLDER>|$(MICROSOFT_CLIENT_SECRET)|" backend/.env
      sed -i "s|<GOOGLE_CLIENT_SECRET_PLACEHOLDER>|$(GOOGLE_CLIENT_SECRET)|" backend/.env
      sed -i "s|<OPENAI_API_KEY_PLACEHOLDER>|$(OPENAI_API_KEY)|" backend/.env
      sed -i "s|<ANTHROPIC_API_KEY_PLACEHOLDER>|$(ANTHROPIC_API_KEY)|" backend/.env
      sed -i "s|<SECRET_KEY_PLACEHOLDER>|$(SECRET_KEY)|" backend/.env
      sed -i "s|<VERSION>|$(Build.BuildId)|" backend/.env
# Step 2: Build and Push Docker Image
- task: AzureCLI@2
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Setting working directory to backend/..."
      cd backend/
      echo "Fetching Azure Container Registry login server..."
      REGISTRY_LOGIN_SERVER=$(az acr show --name $(dockerRegistry) --query loginServer --output tsv)

      echo "Fetching Azure Container Registry credentials..."
      REGISTRY_USERNAME=$(az acr credential show --name $(dockerRegistry) --query username --output tsv)
      REGISTRY_PASSWORD=$(az acr credential show --name $(dockerRegistry) --query "passwords[0].value" --output tsv)

      echo "Logging into Azure Container Registry..."
      echo $REGISTRY_PASSWORD | docker login $REGISTRY_LOGIN_SERVER -u $REGISTRY_USERNAME --password-stdin

      echo "Building Docker image..."
      docker build --no-cache -t $(dockerImageName):$(Build.BuildId) -f Dockerfile .

      echo "Tagging Docker image..."
      docker tag $(dockerImageName):$(Build.BuildId) $REGISTRY_LOGIN_SERVER/$(dockerImageName):$(Build.BuildId)

      echo "Pushing Docker image to ACR..."
      docker push $REGISTRY_LOGIN_SERVER/$(dockerImageName):$(Build.BuildId)

# Step 3: Create App Service Plan and Web App (if not exists)
- task: AzureCLI@2
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Checking if App Service Plan exists..."
      if ! az appservice plan show --name $(planName) --resource-group $(resourceGroup) &> /dev/null; then
        echo "Creating App Service Plan..."
        az appservice plan create \
          --name $(planName) \
          --resource-group $(resourceGroup) \
          --location $(appLocation) \
          --sku B1 \
          --is-linux
      else
        echo "App Service Plan already exists. Skipping creation."
      fi

      echo "Checking if Web App exists..."
      if ! az webapp show --name $(appName) --resource-group $(resourceGroup) &> /dev/null; then
        echo "Creating Web App..."
        az webapp create \
          --resource-group $(resourceGroup) \
          --plan $(planName) \
          --name $(appName) \
          --runtime "DOCKER|"
      else
        echo "Web App already exists. Skipping creation."
      fi

# Step 4: Configure Web App with Docker Image
- task: AzureCLI@2
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Configuring Web App with Docker image..."
      REGISTRY_LOGIN_SERVER=$(az acr show --name $(dockerRegistry) --query loginServer --output tsv)
      REGISTRY_USERNAME=$(az acr credential show --name $(dockerRegistry) --query username --output tsv)
      REGISTRY_PASSWORD=$(az acr credential show --name $(dockerRegistry) --query "passwords[0].value" --output tsv)

      az webapp config container set \
        --resource-group $(resourceGroup) \
        --name $(appName) \
        --container-image-name $REGISTRY_LOGIN_SERVER/$(dockerImageName):$(Build.BuildId) \
        --container-registry-url https://$REGISTRY_LOGIN_SERVER \
        --container-registry-user $REGISTRY_USERNAME \
        --container-registry-password $REGISTRY_PASSWORD

- task: Bash@3
  displayName: 'Health Check'
  inputs:
    targetType: 'inline'
    script: |
      echo "Checking health endpoint..."
      echo "https://$(appName).azurewebsites.net/health"
      for i in {1..3}; do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$(appName).azurewebsites.net/health")
        if [ "$STATUS" -eq 200 ]; then
          echo "Health check passed!"
          exit 0
        else
          echo "Health check failed with status $STATUS. Retrying in 10 seconds..."
          sleep 10
        fi
      done
      echo "Health check failed after multiple attempts."
      exit 1