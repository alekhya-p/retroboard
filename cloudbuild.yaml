steps:
  # Get project number
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
        echo "$$PROJECT_NUMBER" > /workspace/project_number.txt

  # # Initialize Terraform
  # - name: 'hashicorp/terraform:1.5.0'
  #   entrypoint: 'sh'
  #   args: 
  #     - '-c'
  #     - |
  #       cd terraform
  #       terraform init

  # # Apply Terraform
  # - name: 'hashicorp/terraform:1.5.0'
  #   entrypoint: 'sh'
  #   args: 
  #     - '-c'
  #     - |
  #       cd terraform
  #       terraform apply -auto-approve -var="project_id=${PROJECT_ID}" -var="region=europe-west4" -var="github_org=${_GITHUB_ORG}"

  # Build the frontend
  - name: 'node:20'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd frontend
        npm ci
        npm run build:ignore-ts

  # Deploy to Firebase Hosting
  - name: 'node:20'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project ${PROJECT_ID} --non-interactive

  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west4-docker.pkg.dev/$PROJECT_ID/retroboard/retroboard:$COMMIT_SHA', '.']
    dir: '.'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west4-docker.pkg.dev/$PROJECT_ID/retroboard/retroboard:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - retroboard-service
      - --image
      - europe-west4-docker.pkg.dev/${PROJECT_ID}/retroboard/retroboard:${COMMIT_SHA}
      - --region
      - europe-west4
      - --port
      - "8000"
      - --min-instances
      - "1"
      - --set-env-vars
      - >
        GOOGLE_CLOUD_PROJECT=${PROJECT_ID},
        GOOGLE_CLOUD_PROJECT_NUMBER=$(cat /workspace/project_number.txt),
        VERSION=${COMMIT_SHA}
# Only trigger on main branch
substitutions:
  _BRANCH: main
  _GITHUB_ORG: "your-github-org"

timeout: '1600s'
options:
  logging: CLOUD_LOGGING_ONLY 