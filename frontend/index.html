    <script type="application/ld+json">

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is an agile retrospective?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An agile retrospective is a recurring meeting (usually at the end of a sprint) where a team inspects how the sprint went and decides what to change for the next one. It is the single highest-leverage ceremony in scrum because it is the only one explicitly aimed at improving how the team works."
          }
        },
        {
          "@type": "Question",
          "name": "What is an AI retrospective?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An AI retrospective is a sprint retrospective in which generative AI assists facilitation - typically by generating one-click summaries, extracting SMART action items from sticky notes, and creating custom retro templates from a one-sentence prompt. reAItro uses Google Vertex AI to deliver these features for free."
          }
        },
        {
          "@type": "Question",
          "name": "Is reAItro free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. reAItro is free for agile teams, with no credit card required. You get real-time retrospective boards, 26+ templates, AI summaries, SMART action items and an AI template generator at no cost."
          }
        },
        {
          "@type": "Question",
          "name": "How long should a sprint retrospective be?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For a typical two-week sprint, plan 60-90 minutes for the retrospective. The Scrum Guide caps it at three hours for a one-month sprint, proportionally less for shorter sprints."
          }
        }
      ]
    }
